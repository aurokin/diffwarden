name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install --global npm@latest

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: published
        run: |
          package="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          for attempt in 1 2 3 4 5 6; do
            if npm view "$package" version >/dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "$package is already published; skipping publish." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [ "$attempt" != "6" ]; then
              sleep 10
            fi
          done

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "$package is not published yet; continuing." >> "$GITHUB_STEP_SUMMARY"

      - name: Enable Corepack
        if: steps.published.outputs.exists == 'false'
        run: corepack enable

      - name: Install dependencies
        if: steps.published.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Verify package
        if: steps.published.outputs.exists == 'false'
        run: pnpm check

      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public
